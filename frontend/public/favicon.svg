<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1917"/>
      <stop offset="100%" stop-color="#0C0A09"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- C arc — vault shape -->
  <path d="M 346 149 A 140 140 0 1 0 346 363"
        stroke="url(#accent)" stroke-width="52" fill="none" stroke-linecap="round"/>
  <!-- Cascade bars — staggered right and down -->
  <rect x="216" y="192" width="76" height="28" rx="14" fill="url(#accent)"/>
  <rect x="234" y="242" width="76" height="28" rx="14" fill="url(#accent)"/>
  <rect x="252" y="292" width="76" height="28" rx="14" fill="url(#accent)"/>
</svg>
